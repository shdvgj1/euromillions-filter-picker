name: Update Draw Data

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron uses UTC only.
    # We trigger at both 20:00 and 21:00 UTC on Wednesday/Friday,
    # then keep only the run that matches 22:00 in Europe/Paris
    # so CET and CEST are both covered correctly.
    - cron: "0 20 * * 3,5"
    - cron: "0 21 * * 3,5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-draw-data
  cancel-in-progress: true

jobs:
  update-draws:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate France local schedule window
        id: local_time_guard
        if: github.event_name == 'schedule'
        run: |
          local_hour="$(TZ=Europe/Paris date +%H)"
          local_day="$(TZ=Europe/Paris date +%u)"
          if [ "$local_hour" = "22" ] && { [ "$local_day" = "3" ] || [ "$local_day" = "5" ]; }; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Matched Wednesday/Friday 22:00 in Europe/Paris."
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping because current Europe/Paris time is not Wednesday/Friday 22:00."
          fi

      - name: Set up Python
        if: github.event_name != 'schedule' || steps.local_time_guard.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh draw data file
        if: github.event_name != 'schedule' || steps.local_time_guard.outputs.should_run == 'true'
        run: python scripts/update_draws.py

      - name: Commit updated draw data
        id: commit_data
        if: github.event_name != 'schedule' || steps.local_time_guard.outputs.should_run == 'true'
        run: |
          if git diff --quiet -- data/draws.json data/history-draws.json data/tens-patterns.json data/ones-patterns.json; then
            echo "No data changes detected."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/draws.json data/history-draws.json data/tens-patterns.json data/ones-patterns.json
          git commit -m "Update draw data"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Configure Pages
        if: (github.event_name != 'schedule' || steps.local_time_guard.outputs.should_run == 'true') && steps.commit_data.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Prepare static artifact
        if: (github.event_name != 'schedule' || steps.local_time_guard.outputs.should_run == 'true') && steps.commit_data.outputs.changed == 'true'
        run: |
          rm -rf dist
          mkdir -p dist/data
          cp index.html dist/index.html
          cp favicon.ico dist/favicon.ico
          cp .nojekyll dist/.nojekyll
          cp data/draws.json dist/data/draws.json
          cp data/history-draws.json dist/data/history-draws.json
          cp data/tens-patterns.json dist/data/tens-patterns.json
          cp data/ones-patterns.json dist/data/ones-patterns.json

      - name: Upload Pages artifact
        if: (github.event_name != 'schedule' || steps.local_time_guard.outputs.should_run == 'true') && steps.commit_data.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy updated Pages artifact
        if: (github.event_name != 'schedule' || steps.local_time_guard.outputs.should_run == 'true') && steps.commit_data.outputs.changed == 'true'
        uses: actions/deploy-pages@v4
